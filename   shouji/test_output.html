<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模型输出测试</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.16.3/dist/ort.min.js"></script>
</head>
<body>
    <h1>模型输出测试</h1>
    <div id="output"></div>

    <script>
        // 禁用WebAssembly
        ort.env.wasm.enabled = false;

        async function testModel() {
            const outputDiv = document.getElementById('output');
            outputDiv.innerHTML = '测试中...';

            try {
                // 加载模型
                console.log('正在加载模型...');
                const model = await ort.InferenceSession.create('model/model.onnx', {
                    executionProviders: ['cpu'],
                    graphOptimizationLevel: 'all'
                });

                console.log('模型加载成功');
                console.log('输入名称:', model.inputNames);
                console.log('输出名称:', model.outputNames);

                // 创建测试输入 (1x3x640x640)
                const inputShape = [1, 3, 640, 640];
                const inputSize = inputShape.reduce((a, b) => a * b);
                const inputData = new Float32Array(inputSize);
                
                // 填充随机数据
                for (let i = 0; i < inputSize; i++) {
                    inputData[i] = Math.random();
                }

                const inputTensor = new ort.Tensor('float32', inputData, inputShape);
                
                // 运行推理
                console.log('正在运行推理...');
                const startTime = performance.now();
                const results = await model.run({ images: inputTensor });
                const endTime = performance.now();
                
                console.log('推理时间:', (endTime - startTime).toFixed(2), 'ms');
                console.log('输出结果:', results);

                // 显示输出信息
                let outputHTML = '<h2>模型信息：</h2>';
                outputHTML += `<p>输入名称: ${model.inputNames.join(', ')}</p>`;
                outputHTML += `<p>输出名称: ${model.outputNames.join(', ')}</p>`;
                
                // 显示每个输出的形状
                for (const [name, tensor] of Object.entries(results)) {
                    outputHTML += `<h3>输出 ${name}：</h3>`;
                    outputHTML += `<p>形状: ${tensor.dims.join('x')}</p>`;
                    outputHTML += `<p>数据类型: ${tensor.type}</p>`;
                    outputHTML += `<p>数据长度: ${tensor.data.length}</p>`;
                    
                    // 显示前10个数据点
                    const data = Array.from(tensor.data).slice(0, 10);
                    outputHTML += `<p>前10个数据点: ${data.join(', ')}</p>`;
                }

                outputDiv.innerHTML = outputHTML;

            } catch (error) {
                console.error('测试失败:', error);
                outputDiv.innerHTML = `<p style="color: red;">错误: ${error.message}</p>`;
            }
        }

        // 运行测试
        testModel();
    </script>
</body>
</html>
